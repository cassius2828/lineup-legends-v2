name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      CI: "true"
      SKIP_ENV_VALIDATION: "1"
      MONGODB_URI: mongodb://localhost:27017/lineup-legends-e2e
      REDIS_URL: redis://localhost:6379
      AUTH_SECRET: ci-e2e-secret-32chars-longenough!
      AUTH_TRUST_HOST: "true"
      AUTH_URL: http://localhost:3000
      AUTH_GOOGLE_CLIENT_ID: ci-placeholder
      AUTH_GOOGLE_CLIENT_SECRET: ci-placeholder
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ci-placeholder
      AWS_SECRET_ACCESS_KEY: ci-placeholder
      BUCKET_NAME: ci-placeholder
      RESEND_API_KEY: re_ci_placeholder
      YOUTUBE_API_KEY: ci-placeholder
      MFA_ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      NEXT_PUBLIC_CLOUDFRONT_URL: https://ci-placeholder.cloudfront.net
      NEXT_PUBLIC_GIPHY_API_KEY: ci-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run e2e tests
        run: npx playwright test

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
